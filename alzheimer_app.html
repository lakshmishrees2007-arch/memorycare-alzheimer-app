<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoryCare — Alzheimer's Detection & Monitoring</title>
<style>
  :root {
    --primary: #1a6b5a;
    --primary-light: #e8f5f1;
    --primary-mid: #2d9c7e;
    --accent: #e86c3a;
    --accent-light: #fdf0ea;
    --bg: #f7f8f6;
    --surface: #ffffff;
    --surface2: #f0f4f2;
    --text: #1c2b27;
    --text2: #4a6259;
    --text3: #8aab9e;
    --border: #d4e4de;
    --danger: #c0392b;
    --danger-light: #fdecea;
    --warning: #d68910;
    --warning-light: #fef9e7;
    --success: #1a6b5a;
    --success-light: #e8f5f1;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(26,107,90,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* AUTH */
  .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; background: linear-gradient(135deg, #e8f5f1 0%, #f7f8f6 60%, #fdf0ea 100%); }
  .auth-card { background: var(--surface); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 8px 40px rgba(26,107,90,0.12); }
  .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 0.5rem; }
  .auth-logo-icon { width: 40px; height: 40px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .auth-logo-icon svg { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 2; }
  .auth-logo h1 { font-size: 22px; font-weight: 700; color: var(--primary); }
  .auth-subtitle { color: var(--text2); font-size: 14px; margin-bottom: 2rem; }
  .role-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; background: var(--surface2); padding: 4px; border-radius: var(--radius-sm); }
  .role-tab { flex: 1; padding: 8px; text-align: center; border-radius: 6px; border: none; background: transparent; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text2); transition: all 0.2s; }
  .role-tab.active { background: var(--surface); color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: var(--primary); }
  .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.2s; font-family: inherit; }
  .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); }
  .form-group textarea { min-height: 92px; resize: vertical; line-height: 1.5; }
  .btn-primary { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #145748; }
  .demo-hint { text-align: center; font-size: 12px; color: var(--text3); margin-top: 1rem; }

  /* LAYOUT */
  .app { display: none; min-height: 100vh; }
  .app.visible { display: flex; flex-direction: column; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo { font-size: 18px; font-weight: 700; color: var(--primary); background: none; border: none; cursor: pointer; padding: 6px 0; }
  .topbar-badge { background: var(--primary-light); color: var(--primary); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .home-btn { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border: 1.5px solid var(--border); background: var(--surface); color: var(--primary); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; }
  .home-btn:hover { background: var(--primary-light); border-color: var(--primary); }
  .home-btn svg { width: 16px; height: 16px; }
  .notif-btn { position: relative; background: none; border: none; cursor: pointer; padding: 6px; border-radius: 8px; }
  .notif-dot { position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; border: 2px solid white; }
  .user-chip { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: 20px; padding: 5px 12px 5px 5px; cursor: pointer; border: none; }
  .user-avatar { width: 28px; height: 28px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 700; }
  .user-name { font-size: 13px; font-weight: 500; color: var(--text); }

  /* NAV */
  .main-layout { display: flex; flex: 1; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 0; flex-shrink: 0; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
  .nav-section { margin-bottom: 1.5rem; }
  .nav-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 1.25rem; margin-bottom: 0.4rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 1.25rem; cursor: pointer; border: none; background: none; width: 100%; text-align: left; color: var(--text2); font-size: 14px; font-weight: 500; border-radius: 0; transition: all 0.15s; position: relative; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--primary-light); color: var(--primary); }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-badge { margin-left: auto; background: var(--accent); color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; }

  /* CONTENT */
  .content { flex: 1; padding: 1.75rem; overflow-y: auto; max-width: 1100px; }
  .page { display: none; }
  .page.active { display: block; }
  .page-header { margin-bottom: 1.5rem; }
  .page-title { font-size: 22px; font-weight: 700; color: var(--text); }
  .page-sub { font-size: 14px; color: var(--text2); margin-top: 4px; }

  /* CARDS */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .card-title svg { width: 18px; height: 18px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1rem; }

  /* STAT CARDS */
  .stat-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.1rem 1.25rem; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .stat-card.green { border-left: 3px solid var(--primary); }
  .stat-card.amber { border-left: 3px solid var(--warning); }
  .stat-card.red { border-left: 3px solid var(--danger); }
  .stat-card.blue { border-left: 3px solid #2980b9; }

  /* ALERTS */
  .alert { padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 14px; display: flex; align-items: flex-start; gap: 10px; }
  .alert.danger { background: var(--danger-light); color: var(--danger); border: 1px solid #f5c6c2; }
  .alert.warning { background: var(--warning-light); color: var(--warning); border: 1px solid #fde8a0; }
  .alert.success { background: var(--success-light); color: var(--success); border: 1px solid #b8ddd5; }
  .alert svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

  /* CAMERA */
  .camera-box { background: #0d1f1a; border-radius: var(--radius); overflow: hidden; position: relative; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; }
  .camera-feed { width: 100%; height: 100%; object-fit: cover; display: none; }
  .camera-placeholder { text-align: center; color: #4a7060; }
  .camera-placeholder svg { width: 48px; height: 48px; margin: 0 auto 12px; display: block; }
  .camera-placeholder p { font-size: 14px; }
  .camera-overlay { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
  .camera-badge { background: rgba(0,0,0,0.6); color: white; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; backdrop-filter: blur(4px); }
  .camera-badge.live { background: rgba(192,57,43,0.8); }
  .face-markers { position: absolute; inset: 0; pointer-events: none; }
  .emotion-result { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 1rem; }
  .emotion-bar { text-align: center; }
  .emotion-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .emotion-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .emotion-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .emotion-pct { font-size: 12px; font-weight: 600; color: var(--text); margin-top: 3px; }

  /* SPEECH */
  .speech-box { min-height: 120px; background: var(--surface2); border-radius: var(--radius-sm); border: 1.5px dashed var(--border); padding: 1rem; font-size: 14px; color: var(--text); line-height: 1.7; position: relative; }
  .speech-hint { color: var(--text3); font-style: italic; }
  .analysis-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
  .pill { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .pill.green { background: var(--success-light); color: var(--success); }
  .pill.amber { background: var(--warning-light); color: var(--warning); }
  .pill.red { background: var(--danger-light); color: var(--danger); }
  .pill.gray { background: var(--surface2); color: var(--text2); }
  .mic-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .mic-btn:hover { background: #145748; }
  .mic-btn.recording { background: var(--danger); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  /* MEMORY GAME */
  .game-grid { display: grid; gap: 8px; margin: 1rem 0; }
  .game-card { aspect-ratio: 1; background: var(--primary); border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: all 0.3s; border: none; color: transparent; }
  .game-card.flipped, .game-card.matched { color: white; }
  .game-card.flipped { background: var(--primary-mid); transform: scale(1.05); }
  .game-card.matched { background: var(--success); }
  .game-stats { display: flex; gap: 1.5rem; margin-bottom: 1rem; }
  .game-stat { text-align: center; }
  .game-stat-val { font-size: 24px; font-weight: 700; color: var(--primary); }
  .game-stat-lbl { font-size: 11px; color: var(--text3); }

  /* HEART RATE */
  .hr-display { text-align: center; padding: 1.5rem; }
  .hr-number { font-size: 56px; font-weight: 700; color: var(--primary); line-height: 1; }
  .hr-unit { font-size: 16px; color: var(--text2); font-weight: 400; }
  .hr-status { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 8px; }
  .hr-chart { height: 80px; background: var(--surface2); border-radius: var(--radius-sm); overflow: hidden; position: relative; margin-top: 1rem; }
  canvas.hr-canvas { width: 100%; height: 100%; }

  /* SYMPTOMS */
  .symptom-q { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
  .symptom-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
  .answer-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .answer-btn { padding: 10px 20px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer; transition: all 0.2s; }
  .answer-btn:hover, .answer-btn.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; margin-bottom: 2rem; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.4s; }
  .score-ring { width: 140px; height: 140px; margin: 0 auto 1rem; }
  .score-ring svg { width: 100%; height: 100%; }

  /* REMINDERS */
  .reminder-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .reminder-time { font-size: 13px; font-weight: 700; color: var(--primary); min-width: 52px; }
  .reminder-info { flex: 1; }
  .reminder-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .reminder-dose { font-size: 12px; color: var(--text2); }
  .reminder-status { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; background: var(--surface); }
  .reminder-status.done { background: var(--success); border-color: var(--success); }
  .reminder-status.done svg { stroke: white; }
  .reminder-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }

  /* CARETAKER DASHBOARD */
  .patient-card { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 10px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
  .patient-card.active { border-color: var(--primary); background: var(--primary-light); }
  .patient-avatar { width: 44px; height: 44px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .patient-info { flex: 1; }
  .patient-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .patient-meta { font-size: 12px; color: var(--text2); }
  .risk-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .risk-badge.low { background: var(--success-light); color: var(--success); }
  .risk-badge.moderate { background: var(--warning-light); color: var(--warning); }
  .risk-badge.high { background: var(--danger-light); color: var(--danger); }
  .alert-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .alert-dot.red { background: var(--danger); }
  .alert-dot.amber { background: var(--warning); }
  .alert-dot.green { background: var(--success); }
  .alert-text { font-size: 13px; color: var(--text); }
  .alert-time { font-size: 11px; color: var(--text3); }

  /* TASKS */
  .task-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 8px; }
  .task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .task-check.done { background: var(--success); border-color: var(--success); }
  .task-text { flex: 1; font-size: 14px; }
  .task-text.done { text-decoration: line-through; color: var(--text3); }
  .task-time { font-size: 12px; color: var(--text3); }
  .alarm-chip { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--warning-light); color: var(--warning); border-radius: 20px; font-size: 11px; font-weight: 600; }

  /* MANUAL ENTRY + CARE PLAN */
  .entry-form { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-top: 1rem; }
  .empty-state { padding: 1rem; border: 1px dashed var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 14px; text-align: center; }
  .solution-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1rem; }
  .solution-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .solution-card h3 { font-size: 15px; margin-bottom: 0.6rem; color: var(--primary); }
  .solution-card h4 { font-size: 13px; margin: 0.75rem 0 0.25rem; color: var(--text); }
  .solution-card p, .solution-card li { font-size: 13px; color: var(--text2); line-height: 1.55; }
  .solution-card ul, .solution-card ol { padding-left: 1.1rem; }

  /* BUTTONS */
  .btn { padding: 9px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-outline { background: transparent; border: 1.5px solid var(--primary); color: var(--primary); }
  .btn-outline:hover { background: var(--primary-light); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-row { display: flex; gap: 10px; margin-top: 1rem; flex-wrap: wrap; }

  /* RISK SCORE */
  .risk-meter { height: 16px; background: linear-gradient(90deg, #1a6b5a 0%, #d68910 50%, #c0392b 100%); border-radius: 8px; position: relative; margin: 0.5rem 0 1.5rem; }
  .risk-needle { position: absolute; top: -4px; width: 4px; height: 24px; background: var(--text); border-radius: 2px; transform: translateX(-50%); transition: left 0.8s; }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 0.5rem; }
  .modal-body { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.6; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

  /* ALARM MODAL */
  .alarm-modal { background: var(--surface); border-radius: 16px; padding: 2rem; max-width: 360px; text-align: center; }
  .alarm-icon { width: 72px; height: 72px; background: var(--warning-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
  .alarm-icon svg { width: 36px; height: 36px; stroke: var(--warning); }
  .alarm-title { font-size: 20px; font-weight: 700; margin-bottom: 0.5rem; }
  .alarm-time { font-size: 32px; font-weight: 700; color: var(--primary); margin-bottom: 1rem; }
  .alarm-dismiss { padding: 12px 32px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; margin: 0 auto; display: block; }

  .hidden { display: none !important; }
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .solution-grid { grid-template-columns: 1fr; }
    .emotion-result { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="white"/></svg>
      </div>
      <h1>MemoryCare</h1>
    </div>
    <p class="auth-subtitle">Alzheimer's Early Detection & Patient Monitoring</p>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('patient',this)">🧑‍⚕️ Patient</button>
      <button class="role-tab" onclick="setRole('caretaker',this)">👨‍👩‍👧 Caretaker</button>
    </div>
    <div class="form-group">
      <label>Patient name</label>
      <input type="text" id="setupPatientName" placeholder="Enter patient name" value="Ram Patel">
    </div>
    <div class="form-group">
      <label>Patient age</label>
      <input type="number" id="setupPatientAge" placeholder="Enter age" value="72">
    </div>
    <div class="form-group">
      <label>Home address</label>
      <input type="text" id="setupHome" placeholder="Enter home address" value="Green Park, New Delhi">
    </div>
    <div class="form-group">
      <label>Caregiver / doctor name</label>
      <input type="text" id="setupCaregiver" placeholder="Enter caregiver name" value="Dr. Meera Shah">
    </div>
    <div class="form-group">
      <label>Emergency contact</label>
      <input type="text" id="setupEmergency" placeholder="Enter phone number" value="+91 98765 43210">
    </div>
    <div class="form-group">
      <label>Care notes</label>
      <textarea id="setupNotes" placeholder="Enter diagnosis notes, preferences, or routines">MCI - Mild Cognitive Impairment. Prefers familiar voice reminders.</textarea>
    </div>

<script>
let currentRole = 'patient';
let currentPage = 'dashboard';
let alarmTimer = null;

let tasksDone = {};

let speechRecording = false;
let cameraOn = false;
let emotionInterval = null;
let mediaStream = null;

let patientProfile = loadStored('mc_patient_profile', {
  name: 'Ram Patel',
  age: '72',
  home: 'Green Park, New Delhi',
  caregiver: 'Dr. Meera Shah',
  emergency: '+91 98765 43210',
  notes: 'MCI - Mild Cognitive Impairment. Prefers familiar voice reminders.'
});
let manualMeds = loadStored('mc_manual_meds', []);
let manualTasks = loadStored('mc_manual_tasks', []);

function clearOldDemoData() {
  const demoMedKeys = ['med1', 'med2', 'med3'];
  const demoTaskKeys = ['t1', 't2', 't3', 't4', 't5', 't6'];
  if (manualMeds.length === 3 && manualMeds.every(m => demoMedKeys.includes(m.key))) {
    manualMeds = [];
    saveStored('mc_manual_meds', manualMeds);
  }
  if (manualTasks.length === 6 && manualTasks.every(t => demoTaskKeys.includes(t.key))) {
    manualTasks = [];
    saveStored('mc_manual_tasks', manualTasks);
  }
}
clearOldDemoData();

function loadStored(key, fallback) {
  try {
    const saved = localStorage.getItem(key);
    return saved ? JSON.parse(saved) : fallback;
  } catch (e) {
    return fallback;
  }
}

function saveStored(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function escapeHtml(value) {
  return String(value || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function newKey(prefix) {
  return `${prefix}${Date.now()}${Math.floor(Math.random() * 1000)}`;
}

const patientNav = [
  { section:'Overview', items:[
    { id:'dashboard', label:'Dashboard', icon:'home' },
    { id:'risk', label:'Risk Score', icon:'chart-bar' },
  ]},
  { section:'Detection Tools', items:[
    { id:'facial', label:'Facial Analysis', icon:'camera' },
    { id:'speech', label:'Speech Test', icon:'microphone' },
    { id:'memory', label:'Memory Game', icon:'brain' },
    { id:'symptoms', label:'Symptom Check', icon:'clipboard' },
    { id:'heartrate', label:'Heart Rate', icon:'heart' },
  ]},
  { section:'Daily Care', items:[
    { id:'reminders', label:'Medication', icon:'pill', badge:'3' },
    { id:'tasks', label:'Tasks & Alarms', icon:'alarm' },
    { id:'careplan', label:'Care Plan', icon:'clipboard' },
  ]},
  { section:'History', items:[
    { id:'alerts', label:'My Alerts', icon:'bell' },
  ]},
];

const caretakerNav = [
  { section:'Overview', items:[
    { id:'dashboard', label:'Dashboard', icon:'home' },
    { id:'alerts', label:'Live Alerts', icon:'bell', badge:'2' },
  ]},
  { section:'Patients', items:[
    { id:'patients', label:'All Patients', icon:'users' },
    { id:'patient_detail', label:'Patient Detail', icon:'chart-line' },
  ]},
  { section:'Tools', items:[
    { id:'reminders', label:'Manage Meds', icon:'pill' },
    { id:'tasks', label:'Task Planner', icon:'alarm' },
    { id:'careplan', label:'Care Plan', icon:'clipboard' },
  ]},
];

function setRole(role, el) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('authEmail').value = role === 'patient' ? 'patient@demo.com' : 'caretaker@demo.com';
}

function getInitials(name) {
  const parts = String(name || 'User').trim().split(/\s+/).filter(Boolean);
  return (parts[0]?.[0] || 'U') + (parts[1]?.[0] || '');
}

function login() {
  patientProfile = {
    name: document.getElementById('setupPatientName').value.trim() || 'Patient',
    age: document.getElementById('setupPatientAge').value.trim(),
    home: document.getElementById('setupHome').value.trim(),
    caregiver: document.getElementById('setupCaregiver').value.trim() || 'Caregiver',
    emergency: document.getElementById('setupEmergency').value.trim(),
    notes: document.getElementById('setupNotes').value.trim()
  };
  saveStored('mc_patient_profile', patientProfile);
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('visible');
  if (currentRole === 'patient') {
    document.getElementById('roleBadge').textContent = 'Patient';
    document.getElementById('userName').textContent = patientProfile.name;
    document.getElementById('userInitials').textContent = getInitials(patientProfile.name);
  } else {
    document.getElementById('roleBadge').textContent = 'Caretaker';
    document.getElementById('userName').textContent = patientProfile.caregiver;
    document.getElementById('userInitials').textContent = getInitials(patientProfile.caregiver);
  }
  buildNav();
  showPage('dashboard');
  startHeartRate();
  scheduleAlarm();
}

function logout() {
  stopCamera(); clearInterval(hrInterval); clearTimeout(alarmTimer);
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('authScreen').style.display = 'flex';
}

function buildNav() {
  const nav = currentRole === 'patient' ? patientNav : caretakerNav;
  let html = '';
  nav.forEach(sec => {
    html += `<div class="nav-section"><div class="nav-label">${sec.section}</div>`;
    sec.items.forEach(item => {
      html += `<button class="nav-item" id="nav-${item.id}" onclick="showPage('${item.id}')">
        ${navIcon(item.icon)} ${item.label}
        ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
      </button>`;
    });
    html += '</div>';
  });
  document.getElementById('sidebar').innerHTML = html;
}

function showPage(id) {
  currentPage = id;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('active');
  stopCamera();
  const content = document.getElementById('mainContent');
  content.innerHTML = buildPage(id);
  afterPageLoad(id);
}

function goHome() {
  closeModal('alarmModal');
  closeModal('alertModal');
  showPage('dashboard');
}

function buildPage(id) {
  if (currentRole === 'patient') {
    if (id === 'dashboard') return patientDashboard();
    if (id === 'risk') return riskPage();
    if (id === 'facial') return facialPage();
    if (id === 'speech') return speechPage();
    if (id === 'memory') return memoryPage();
    if (id === 'symptoms') return symptomsPage();
    if (id === 'heartrate') return heartratePage();
    if (id === 'reminders') return remindersPage();
    if (id === 'tasks') return tasksPage();
    if (id === 'careplan') return carePlanPage();
    if (id === 'alerts') return alertsPage(false);
  } else {
    if (id === 'dashboard') return caretakerDashboard();
    if (id === 'alerts') return alertsPage(true);
    if (id === 'patients') return patientsPage();
    if (id === 'patient_detail') return patientDetailPage();
    if (id === 'reminders') return remindersPage();
    if (id === 'tasks') return tasksPage();
    if (id === 'careplan') return carePlanPage();
  }
  return '<div class="page-header"><h1 class="page-title">Coming soon</h1></div>';
}

function formatTime(value) {
  if (!value) return '';
  const [h, m] = value.split(':');
  const hour = parseInt(h, 10);
  const suffix = hour >= 12 ? 'PM' : 'AM';
  const displayHour = ((hour + 11) % 12) + 1;
  return `${displayHour}:${m} ${suffix}`;
}

function addMedication() {
  const name = document.getElementById('medName').value.trim();
  const dose = document.getElementById('medDose').value.trim();
  const time = formatTime(document.getElementById('medTime').value);
  const icon = document.getElementById('medIcon').value;
  if (!name || !time) {
    alert('Please enter a medication name and reminder time.');
    return;
  }
  manualMeds.push({time, name, dose: dose || 'No dose entered', color:'#2980b9', icon, key:newKey('med')});
  saveStored('mc_manual_meds', manualMeds);
  scheduleAlarm();
  showPage('reminders');
}

function deleteMedication(key) {
  manualMeds = manualMeds.filter(m => m.key !== key);
  delete remindersDone[key];
  saveStored('mc_manual_meds', manualMeds);
  showPage('reminders');
}

function addTask() {
  const label = document.getElementById('taskName').value.trim();
  const time = formatTime(document.getElementById('taskTime').value);
  if (!label || !time) {
    alert('Please enter a task name and alarm time.');
    return;
  }
  manualTasks.push({label, time, key:newKey('task')});
  saveStored('mc_manual_tasks', manualTasks);
  scheduleAlarm();
  document.getElementById('alarmTitle').textContent = 'Custom Task Alarm';
  document.getElementById('alarmTime').textContent = time;
  document.getElementById('alarmDesc').textContent = label;
  showPage('tasks');
}

function deleteTask(key) {
  manualTasks = manualTasks.filter(t => t.key !== key);
  delete tasksDone[key];
  saveStored('mc_manual_tasks', manualTasks);
  showPage('tasks');
}

function startHeartRate() {
  hrData = Array.from({length:40},()=>Math.round(68+Math.random()*10));
  hrInterval = setInterval(()=>{
    const newHR = Math.round(65+Math.random()*20);
    hrData.push(newHR); if(hrData.length>60) hrData.shift();
    document.querySelectorAll('#hrNum,#dashHR,#dashHR2').forEach(el=>{if(el)el.textContent=newHR});
    const status = document.getElementById('hrStatus');
    if (status) { status.textContent = newHR > 100 ? 'Elevated' : newHR < 55 ? 'Low' : 'Normal'; }
    drawHRCanvas();
  }, 1000);
}

function drawHRCanvas() {
  const canvas = document.getElementById('hrCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2,2); const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = '#1a6b5a'; ctx.lineWidth = 2;
  const data = hrData.slice(-40);
  ctx.beginPath();
  data.forEach((v,i)=>{ const x=i*(w/(data.length-1)), y=h-((v-50)/(120-50))*h; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();
}

function startHRPage() { drawHRCanvas(); }

function drawHR24Chart() {
  const canvas = document.getElementById('hr24Chart');
  if (!canvas) return;
  setTimeout(()=>{
    const ctx = canvas.getContext('2d');
    const data = Array.from({length:24},(_,i)=>Math.round(58+Math.sin(i/3)*8+Math.random()*6));
    canvas.width = canvas.offsetWidth*2; canvas.height = 200;
    ctx.scale(2,1); const w=canvas.offsetWidth, h=200;
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle='#1a6b5a'; ctx.lineWidth=2; ctx.beginPath();
    data.forEach((v,i)=>{const x=i*(w/23),y=h-((v-50)/70)*h; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();
    ctx.fillStyle='rgba(26,107,90,0.1)'; ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.fill();
  },100);
}

function drawRiskChart() {
  setTimeout(()=>{
    const canvas = document.getElementById('riskChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const data = [45,48,50,52,50,53,54];
    const labels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    canvas.width = canvas.offsetWidth*2; canvas.height = 360;
    ctx.scale(2,2); const w=canvas.offsetWidth, h=180;
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle='#d68910'; ctx.lineWidth=2.5; ctx.beginPath();
    data.forEach((v,i)=>{const x=20+i*((w-40)/6),y=h-20-((v-30)/40)*(h-40); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); ctx.fillStyle='#d68910'; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); if(i>0){const px=20+(i-1)*((w-40)/6),py=h-20-((data[i-1]-30)/40)*(h-40); ctx.moveTo(px,py); ctx.lineTo(x,y); ctx.strokeStyle='#d68910'; ctx.stroke();}});
    labels.forEach((l,i)=>{const x=20+i*((w-40)/6); ctx.fillStyle='#8aab9e'; ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.fillText(l,x,h-4);});
  },100);
}

function drawMemoryChart() {
  setTimeout(()=>{
    const canvas = document.getElementById('memoryChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const data = [74,70,72,68,75,71,68];
    canvas.width = canvas.offsetWidth*2; canvas.height = 240;
    ctx.scale(2,2); const w=canvas.offsetWidth, h=120;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='rgba(26,107,90,0.1)'; ctx.beginPath(); ctx.moveTo(0,h);
    data.forEach((v,i)=>{const x=i*(w/6),y=h-((v-50)/40)*(h-20); ctx.lineTo(x,y);});
    ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#1a6b5a'; ctx.lineWidth=2; ctx.beginPath();
    data.forEach((v,i)=>{const x=i*(w/6),y=h-((v-50)/40)*(h-20); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();
  },100);
}

function drawPatientTrend() {
  setTimeout(()=>{
    const canvas = document.getElementById('patientTrendChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth*2; canvas.height = 300;
    ctx.scale(2,2); const w=canvas.offsetWidth, h=150;
    ctx.clearRect(0,0,w,h);
    const datasets=[{data:[45,48,50,52,50,53,54],color:'#d68910'},{data:[74,70,72,68,75,71,68],color:'#1a6b5a'}];

      ds.data.forEach((v,i)=>{const x=20+i*((w-40)/6),y=h-10-((v-30)/50)*(h-30); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.stroke();
    });
  },100);
}

function initGame() {
  const emojis = ['🌸','🐘','🌙','🦋','🍎','🎵','🌊','🔑'];
  gameState = { cards:[...emojis,...emojis].sort(()=>Math.random()-0.5).map((e,i)=>({id:i,emoji:e,flipped:false,matched:false})), flipped:[], moves:0, matches:0, start:null, timer:null, elapsed:0 };
  clearInterval(gameState.timer); renderGame();
}

function renderGame() {
  const grid = document.getElementById('gameGrid');
  if (!grid) return;
  grid.innerHTML = gameState.cards.map(c=>`<button class="game-card ${c.flipped||c.matched?'flipped':''} ${c.matched?'matched':''}" onclick="flipCard(${c.id})">${c.flipped||c.matched?c.emoji:''}</button>`).join('');
  document.getElementById('gMoves').textContent = gameState.moves;
  document.getElementById('gMatches').textContent = `${gameState.matches}/8`;
  const t = gameState.elapsed; document.getElementById('gTime').textContent = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
}

function flipCard(id) {
  const card = gameState.cards[id];
  if (card.matched || card.flipped || gameState.flipped.length === 2) return;
  if (!gameState.start) { gameState.start = Date.now(); gameState.timer = setInterval(()=>{ gameState.elapsed++; const t=gameState.elapsed; const el=document.getElementById('gTime'); if(el)el.textContent=`${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`; },1000); }
  card.flipped = true; gameState.flipped.push(id); renderGame();
  if (gameState.flipped.length === 2) {
    gameState.moves++;
    const [a,b] = gameState.flipped;
    if (gameState.cards[a].emoji === gameState.cards[b].emoji) {
      gameState.cards[a].matched = gameState.cards[b].matched = true;
      gameState.flipped = []; gameState.matches++;
      if (gameState.matches === 8) { clearInterval(gameState.timer); setTimeout(()=>{ const s=Math.max(0,Math.round(100-gameState.moves*3)); document.getElementById('gScore').textContent=s+'%'; alert(`🎉 Completed! Score: ${s}% (${gameState.moves} moves, ${gameState.elapsed}s)`); },300); }
      renderGame();
    } else {
      setTimeout(()=>{ gameState.cards[a].flipped=gameState.cards[b].flipped=false; gameState.flipped=[]; renderGame(); },900);
    }
  }
}

function toggleCamera() {
  if (cameraOn) stopCamera();
  else startCamera();
}

async function startCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({video:true});
    const video = document.getElementById('cameraFeed');
    if (video) { video.srcObject = mediaStream; video.style.display='block'; }
    const ph = document.getElementById('camPlaceholder'); if(ph) ph.style.display='none';
    const lb = document.getElementById('liveBadge'); if(lb) lb.style.display='block';
    const fd = document.getElementById('faceDetBadge'); if(fd) fd.style.display='block';
    const btn = document.getElementById('camBtn'); if(btn) btn.textContent='⏹ Stop Camera';
    cameraOn = true;
    startEmotionSimulation();
  } catch(e) { alert('Camera access denied or unavailable. Using simulation mode.'); simulateCameraOn(); }
}

function simulateCameraOn() {
  cameraOn = true;
  const ph = document.getElementById('camPlaceholder');
  if (ph) ph.innerHTML='<svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="width:48px;height:48px;margin:0 auto 12px;display:block;stroke:#1a6b5a"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg><p style="color:#1a6b5a;font-weight:600">Simulation mode active</p>';
  const lb = document.getElementById('liveBadge'); if(lb) lb.style.display='block';
  const fd = document.getElementById('faceDetBadge'); if(fd) fd.style.display='block';
  const btn = document.getElementById('camBtn'); if(btn) btn.textContent='⏹ Stop Camera';
  startEmotionSimulation();
}

    Math.round(40+Math.random()*30),
    Math.round(10+Math.random()*25),
    Math.round(5+Math.random()*15),
    Math.round(10+Math.random()*20),
  ];
  const colors = ['#1a6b5a','#d68910','#2980b9','#8e44ad'];
  const container = document.getElementById('emotionDisplay');
  if (!container) return;
  container.innerHTML = `<div class="emotion-result">
    ${emotions.map((e,i)=>`<div class="emotion-bar">
      <div class="emotion-label">${e}</div>
      <div class="emotion-track"><div class="emotion-fill" style="width:${values[i]}%;background:${colors[i]}"></div></div>
      <div class="emotion-pct">${values[i]}%</div>
    </div>`).join('')}
  </div>
  <p style="font-size:12px;color:var(--text3);margin-top:8px">Dominant: <strong>${emotions[values.indexOf(Math.max(...values))]}</strong> — updating every 2s</p>`;
}

function stopCamera() {
  if (mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
  clearInterval(emotionInterval); cameraOn=false;
}

function captureAnalysis() { updateEmotions(); }

function toggleSpeech() {
  speechRecording = !speechRecording;
  const btn = document.getElementById('micBtn');
  const txt = document.getElementById('micBtnText');
  if (speechRecording) {
    if (btn) btn.classList.add('recording');
    if (txt) txt.textContent = 'Recording... (click to stop)';
    simulateSpeech();
  } else {
    if (btn) btn.classList.remove('recording');
    if (txt) txt.textContent = 'Start Recording';
    const res = document.getElementById('speechResults');
    if (res) res.style.display='block';
  }
}

function simulateSpeech() {
  const box = document.getElementById('speechBox');
  if (!box) return;
  const words = ['The','quick','brown','fox','jumps','over','the','lazy','dog.','She','sells','sea-shells','by','the','sea-shore.'];
  let i=0; box.innerHTML='';
  const interval = setInterval(()=>{
    if (i<words.length && speechRecording) { box.innerHTML += ' '+words[i]; i++; }
    else clearInterval(interval);
  },400);
}

function toggleReminder(key,el) {
  remindersDone[key] = !remindersDone[key];
  if (remindersDone[key]) { el.classList.add('done'); el.innerHTML='<svg width="14" height="14" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'; }
  else { el.classList.remove('done'); el.innerHTML=''; }
}

function toggleTask(key,el) {
  tasksDone[key] = !tasksDone[key];
  const txt = el.nextElementSibling;
  if (tasksDone[key]) { el.classList.add('done'); el.innerHTML='<svg width="12" height="12" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'; if(txt) txt.classList.add('done'); }
  else { el.classList.remove('done'); el.innerHTML=''; if(txt) txt.classList.remove('done'); }
}

function scheduleAlarm() {
  clearTimeout(alarmTimer);
  const nextReminder = manualMeds.find(m => !remindersDone[m.key]) || manualTasks.find(t => !tasksDone[t.key]);
  if (!nextReminder) return;
  alarmTimer = setTimeout(()=>{
    document.getElementById('alarmTitle').textContent = manualMeds.includes(nextReminder) ? 'Medication Reminder' : 'Task Reminder';
    document.getElementById('alarmTime').textContent = nextReminder.time || '';
    document.getElementById('alarmDesc').textContent = nextReminder.dose ? `${nextReminder.name} - ${nextReminder.dose}` : nextReminder.label;
    document.getElementById('alarmModal').classList.add('open');
  }, 15000);
}

function dismissAlarm() {
  document.getElementById('alarmModal').classList.remove('open');
}

function showAlarmDemo() {
  document.getElementById('alarmTitle').textContent='Custom Task Alarm';
  document.getElementById('alarmTime').textContent='9:00 AM';
  document.getElementById('alarmDesc').textContent='Your custom task is due now.';
  document.getElementById('alarmModal').classList.add('open');
}

function openCaretakerAlert() {
  document.getElementById('alertModalTitle').textContent='⚠️ Patient Alert — Ram Patel';
  document.getElementById('alertModalBody').textContent='Ram Patel missed his evening Memantine dose and had an elevated heart rate of 112 bpm during rest. Please check in with the patient or a family member.';
  document.getElementById('alertModal').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function callPatient() { closeModal('alertModal'); alert('📞 Initiating call to Ram Patel...'); }
populateSetupForm();
</script>
</body>
</html>
